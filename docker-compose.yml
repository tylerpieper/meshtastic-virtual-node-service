services:
  virtual-node:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_TAG: ${IMAGE_TAG:-beta-debian}
    image: meshtastic-virtual-node
    restart: unless-stopped
    ports:
      - "${API_PORT:-4403}:4403"
    environment:
      - MAC_ADDRESS=${MAC_ADDRESS}
      - NODE_LONG_NAME=${NODE_LONG_NAME:-Virtual Node}
      - NODE_SHORT_NAME=${NODE_SHORT_NAME:-VIRT}
      - NODE_ROLE=${NODE_ROLE:-1}
      - CHANNEL_NAME=${CHANNEL_NAME:-LongFast}
      - CHANNEL_KEY=${CHANNEL_KEY:-AQ==}
      - LATITUDE=${LATITUDE}
      - LONGITUDE=${LONGITUDE}
      - POSITION_PRECISION=${POSITION_PRECISION:-14}
      - HOP_LIMIT=${HOP_LIMIT:-7}
    volumes:
      - ${DATA_DIR:-./data}:/var/opt/meshtasticd
